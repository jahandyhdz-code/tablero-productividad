<!-- partials/sales_chart.html — Grafica diaria, actualizada via HTMX OOB -->
<div id="chart-section" class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
  <h3 class="font-bold text-gray-700 mb-4 text-sm uppercase tracking-wide">
    Pedidos diarios &mdash; {{ months_es[month-1] }} {{ year }}
  </h3>
  <div style="height:220px; position:relative;">
    <canvas id="salesChart"></canvas>
  </div>
  <!-- Datos del chart embebidos para reinicializar tras OOB swap -->
  <script type="application/json" id="chart-json">
    {
      "labels": {{ metrics.chart_labels | tojson }},
      "data":   {{ metrics.chart_data   | tojson }},
      "rest":   {{ metrics.chart_rest   | tojson }}
    }
  </script>
</div>
