{# partials/minijuego_result.html -- resultado de partida, HTMX target #}
<div class="bg-white rounded-2xl border shadow-sm overflow-hidden
            {% if ok %}border-walmart/30{% else %}border-red-200{% endif %}">
  <div class="px-5 py-4">
    {% if ok %}
    <p class="font-black text-walmart-dark text-lg">{{ msg }}</p>
    <div class="mt-3 flex gap-4 text-sm text-gray-600">
      <span>Puntuacion: <strong class="text-spark">{{ score }}/{{ max_score }}</strong></span>
      <span>Partidas restantes hoy: <strong class="text-gray-700">{{ plays_left }}</strong></span>
    </div>
    {% else %}
    <p class="font-bold text-red-600">{{ msg }}</p>
    {% endif %}
  </div>
  {% if plays_left > 0 and ok %}
  <div class="px-5 pb-4">
    <button onclick="location.reload()"
            class="bg-walmart hover:bg-walmart-dark text-white font-bold px-5 py-2 rounded-xl text-sm transition">
      Jugar otra vez ({{ plays_left }} restante{{ 's' if plays_left != 1 else '' }})
    </button>
  </div>
  {% endif %}
</div>
